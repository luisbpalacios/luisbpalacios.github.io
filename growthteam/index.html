<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growth Team — AgentBase</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    :root {
      --orange: #F2561D;
      --dark: #0D0D0D;
      --dark-2: #141414;
      --dark-3: #1A1A1A;
      --dark-4: #222222;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--dark-3);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 10px 18px;
      margin-bottom: 20px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background: var(--orange);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .logo-text {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
      letter-spacing: 0.5px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
    }

    .login-title span { color: var(--orange); }

    .login-subtitle {
      font-size: 14px;
      color: #666;
    }

    .login-card {
      background: var(--dark-3);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      background: var(--dark-4);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 14px 16px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus { border-color: var(--orange); }
    .input-field::placeholder { color: #444; }

    .btn-login {
      width: 100%;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }

    .error-msg {
      display: none;
      background: rgba(242, 86, 29, 0.12);
      border: 1px solid rgba(242, 86, 29, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--orange);
      margin-top: 12px;
      text-align: center;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #444;
      margin-top: 24px;
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="logo-area">
      <div class="logo-badge">
        <div class="logo-dot"></div>
        <span class="logo-text">AgentBase Growth Team</span>
      </div>
      <h1 class="login-title">Portal de <span>Ventas</span></h1>
      <p class="login-subtitle">Acceso exclusivo para el equipo</p>
    </div>

    <div class="login-card">
      <div class="input-group">
        <label class="input-label">Contraseña</label>
        <input
          type="password"
          id="passwordInput"
          class="input-field"
          placeholder="••••••••••••"
          autocomplete="current-password"
        />
      </div>
      <button class="btn-login" onclick="checkPassword()">Entrar →</button>
      <div class="error-msg" id="errorMsg">Contraseña incorrecta. Intenta de nuevo.</div>
    </div>

    <p class="footer-note">Solo para uso interno del equipo de ventas</p>
  </div>

  <script>
    const HASH = "3f05dd0c83f455f62f275acb511d2c83d35473660b892bd0323bf2470664cb8a";

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function checkPassword() {
      const input = document.getElementById('passwordInput').value;
      const inputHash = await sha256(input);
      if (inputHash === HASH) {
        sessionStorage.setItem('gt_auth', '1');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  </script>

</body>
</html>
