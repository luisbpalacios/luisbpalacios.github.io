<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vera Signals — Crypto Futures</title>
<style>
  :root {
    --bg: #060b18;
    --card: #0d1426;
    --card2: #111a2e;
    --border: #1e2d4a;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --long: #16a34a;
    --short: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo span { font-size: 20px; font-weight: 700; }
  .logo .sub { font-size: 12px; color: var(--muted); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .last-update { font-size: 11px; color: var(--muted); text-align: right; }

  /* ── Market Bar ── */
  .market-bar { background: var(--card2); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 24px; overflow-x: auto; white-space: nowrap; }
  .market-item { display: flex; flex-direction: column; gap: 2px; min-width: 80px; }
  .market-item .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .market-item .value { font-size: 14px; font-weight: 600; }
  .market-item .change { font-size: 11px; }
  .up { color: var(--green); } .down { color: var(--red); } .neutral { color: var(--muted); }

  /* ── Main grid ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

  /* ── Signal Cards ── */
  .signals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .signal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; transition: transform .15s, box-shadow .15s; }
  .signal-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .signal-card.long  { border-top: 3px solid var(--long); }
  .signal-card.short { border-top: 3px solid var(--short); }

  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .pair-name { font-size: 20px; font-weight: 700; }
  .direction-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
  .direction-badge.long  { background: rgba(22,163,74,.2); color: #4ade80; }
  .direction-badge.short { background: rgba(220,38,38,.2); color: #f87171; }

  .score-bar-wrap { margin-bottom: 14px; }
  .score-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .score-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; transition: width .5s; }
  .score-fill.high   { background: linear-gradient(90deg, #22c55e, #86efac); }
  .score-fill.medium { background: linear-gradient(90deg, #f59e0b, #fcd34d); }
  .score-fill.low    { background: linear-gradient(90deg, #ef4444, #fca5a5); }

  .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .level-row { display: flex; flex-direction: column; gap: 2px; }
  .level-tag { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .level-val { font-size: 13px; font-weight: 600; font-family: monospace; }
  .level-val.entry { color: var(--accent); }
  .level-val.tp    { color: var(--green); }
  .level-val.sl    { color: var(--red); }

  .tp-levels { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .tp-chip { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.2); color: #4ade80; border-radius: 6px; padding: 4px 8px; font-size: 11px; font-family: monospace; }
  .sl-chip { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: #f87171; border-radius: 6px; padding: 4px 8px; font-size: 11px; font-family: monospace; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .metric { display: flex; justify-content: space-between; }
  .metric .k { color: var(--muted); }
  .metric .v { font-weight: 600; }

  .liq-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); line-height: 1.7; }

  /* ── Watchlist ── */
  .watchlist { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .watch-row { display: grid; grid-template-columns: 100px 1fr 80px 80px 100px 60px; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); transition: background .1s; font-size: 13px; }
  .watch-row:last-child { border-bottom: none; }
  .watch-row:hover { background: var(--card2); }
  .watch-row.header { background: var(--card2); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  .pair-cell { font-weight: 700; font-size: 14px; }
  .price-cell { font-family: monospace; font-weight: 600; }
  .rsi-chip { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .rsi-os  { background: rgba(34,197,94,.15);  color: #4ade80; }
  .rsi-ob  { background: rgba(239,68,68,.15);  color: #f87171; }
  .rsi-mid { background: rgba(100,116,139,.15); color: #94a3b8; }
  .funding-cell { font-family: monospace; font-size: 12px; }

  /* ── Spinner ── */
  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--muted); gap: 12px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .rr-badge { background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2); color: #93c5fd; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; }

  @media (max-width: 600px) {
    .container { padding: 12px; }
    .signals-grid { grid-template-columns: 1fr; }
    .market-bar { gap: 16px; padding: 10px 12px; }
    .watch-row { grid-template-columns: 90px 1fr 70px 60px; font-size: 12px; }
    .watch-row .rsi-col, .watch-row .funding-col { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="status-dot" id="statusDot"></div>
    <div>
      <span>Vera Signals</span>
      <div class="sub">Crypto Futures · Binance</div>
    </div>
  </div>
  <div class="last-update">
    <div id="updateTime">Cargando...</div>
    <div style="font-size:10px;color:#334155">Actualiza cada 5 min</div>
  </div>
</div>

<!-- Market bar -->
<div class="market-bar" id="marketBar">
  <div class="loading"><div class="spinner"></div></div>
</div>

<div class="container">

  <!-- Signals -->
  <div class="section-title">🎯 Señales Activas</div>
  <div class="signals-grid" id="signalsGrid">
    <div class="loading"><div class="spinner"></div><span>Analizando mercado...</span></div>
  </div>

  <!-- Watchlist -->
  <div class="section-title">📊 Watchlist</div>
  <div class="watchlist">
    <div class="watch-row header">
      <div>Par</div>
      <div>Precio</div>
      <div class="rsi-col">RSI 4H</div>
      <div>24h</div>
      <div class="funding-col">Funding</div>
      <div>Score</div>
    </div>
    <div id="watchlistBody">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<script>
const PAIRS = [
  "BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","DOGEUSDT",
  "NEARUSDT","AAVEUSDT","SUIUSDT","RENDERUSDT","TAOUSDT",
  "ZECUSDT","XMRUSDT","WIFUSDT","PENGUUSDT","AEROUSDT",
  "HYPEUSDT","BASEDUSDT"
];
const BASE = "https://fapi.binance.com";

// ── Indicators ──────────────────────────────────────────────────────────────
function ema(values, period) {
  const k = 2 / (period + 1);
  let e = values[0];
  const result = [e];
  for (let i = 1; i < values.length; i++) { e = values[i]*k + e*(1-k); result.push(e); }
  return result;
}

function calcRSI(closes, period=14) {
  let gains=0, losses=0;
  for (let i=1;i<=period;i++) {
    const d = closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses-=d;
  }
  let ag=gains/period, al=losses/period;
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    ag=(ag*(period-1)+Math.max(d,0))/period;
    al=(al*(period-1)+Math.max(-d,0))/period;
  }
  return al===0 ? 100 : +(100-100/(1+ag/al)).toFixed(2);
}

function calcATR(klines, period=14) {
  const trs = [];
  for(let i=1;i<klines.length;i++){
    const h=+klines[i][2], l=+klines[i][3], pc=+klines[i-1][4];
    trs.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));
  }
  return trs.slice(-period).reduce((a,b)=>a+b,0)/period;
}

function calcMACD(closes) {
  const e12=ema(closes,12), e26=ema(closes,26);
  const ml=e12.map((v,i)=>v-e26[i]);
  const sig=ema(ml,9);
  return ml.map((v,i)=>v-sig[i]);
}

// ── Scoring ─────────────────────────────────────────────────────────────────
function scoreKlines(klines) {
  const closes  = klines.map(k=>+k[4]);
  const volumes = klines.map(k=>+k[5]);
  const price   = closes[closes.length-1];
  const e9  = ema(closes,9).slice(-1)[0];
  const e21 = ema(closes,21).slice(-1)[0];
  const e50 = ema(closes,50).slice(-1)[0];
  const rsiV = calcRSI(closes);
  const hist  = calcMACD(closes);
  const hLast = hist[hist.length-1], hPrev = hist[hist.length-2];
  const volAvg = volumes.slice(-20).reduce((a,b)=>a+b,0)/20;
  const volRat = volumes[volumes.length-1]/volAvg;

  let ls=0, ss=0;
  if(rsiV<35)ls+=30; else if(rsiV<45)ls+=18; else if(rsiV<50)ls+=8;
  if(rsiV>65)ss+=30; else if(rsiV>55)ss+=18; else if(rsiV>50)ss+=8;
  if(price>e21)ls+=15; else ss+=15;
  if(e21>e50)ls+=10;   else ss+=10;
  if(hLast>0&&hPrev<=0)ls+=25; else if(hLast>0)ls+=12;
  if(hLast<0&&hPrev>=0)ss+=25; else if(hLast<0)ss+=12;
  if(volRat>2)ls+=20,ss+=20; else if(volRat>1.5)ls+=12,ss+=12;

  return {ls,ss,price,rsiV,e21,e50,volRat:+volRat.toFixed(2),atr:calcATR(klines)};
}

// ── API calls ────────────────────────────────────────────────────────────────
async function fetchKlines(sym, interval="4h", limit=100) {
  const r = await fetch(`${BASE}/fapi/v1/klines?symbol=${sym}&interval=${interval}&limit=${limit}`);
  return r.ok ? r.json() : null;
}
async function fetchFunding(sym) {
  try {
    const r = await fetch(`${BASE}/fapi/v1/fundingRate?symbol=${sym}&limit=1`);
    const d = await r.json();
    return Array.isArray(d)&&d.length ? +(+d[d.length-1].fundingRate*100).toFixed(5) : 0;
  } catch { return 0; }
}
async function fetchTicker(sym) {
  const r = await fetch(`${BASE}/fapi/v1/ticker/24hr?symbol=${sym}`);
  return r.ok ? r.json() : null;
}
async function fetchOI(sym) {
  try {
    const r = await fetch(`${BASE}/futures/data/openInterestHist?symbol=${sym}&period=4h&limit=4`);
    const d = await r.json();
    if(Array.isArray(d)&&d.length>=2){
      const now=+d[d.length-1].sumOpenInterest, old=+d[0].sumOpenInterest;
      return +((now-old)/old*100).toFixed(2);
    }
  } catch {}
  return 0;
}
async function fetchLS(sym) {
  try {
    const r = await fetch(`${BASE}/futures/data/globalLongShortAccountRatio?symbol=${sym}&period=4h&limit=1`);
    const d = await r.json();
    return Array.isArray(d)&&d.length ? {long:+(+d[0].longAccount*100).toFixed(1),short:+(+d[0].shortAccount*100).toFixed(1)} : {long:50,short:50};
  } catch { return {long:50,short:50}; }
}

// ── Format helpers ───────────────────────────────────────────────────────────
function fmtPrice(p) {
  if(p>=1000) return '$'+p.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(p>=1)    return '$'+p.toFixed(4);
  return '$'+p.toFixed(6);
}
function fmtChange(c) {
  const cls = c>0?'up':c<0?'down':'neutral';
  return `<span class="${cls}">${c>0?'+':''}${(+c).toFixed(2)}%</span>`;
}
function scoreClass(s) { return s>=70?'high':s>=50?'medium':'low'; }
function fundingColor(f) { return f>0.03?'#ef4444':f>0.01?'#f59e0b':f<-0.01?'#22c55e':'#94a3b8'; }

// ── Analyze pair ─────────────────────────────────────────────────────────────
async function analyzePair(sym) {
  const [k4h, k1h, k1d, funding, oi, ls] = await Promise.all([
    fetchKlines(sym,"4h",100),
    fetchKlines(sym,"1h",100),
    fetchKlines(sym,"1d",60),
    fetchFunding(sym),
    fetchOI(sym),
    fetchLS(sym),
  ]);
  if(!k4h) return null;

  const s4 = scoreKlines(k4h);
  const s1 = k1h ? scoreKlines(k1h) : {ls:0,ss:0};
  const sd = k1d ? scoreKlines(k1d) : {ls:0,ss:0};

  // Funding adjustment
  let l4=s4.ls, sh4=s4.ss;
  if(funding>0.05){sh4+=15;l4-=10;} else if(funding>0.02){sh4+=7;l4-=5;}
  else if(funding<-0.02){l4+=15;sh4-=10;} else if(funding<-0.01){l4+=7;sh4-=5;}
  // OI adjustment
  if(oi>3&&s4.price>s4.e21)l4+=10;
  else if(oi<-3&&s4.price<s4.e21)sh4+=10;
  else if(oi<-3)l4-=8;

  const lf = Math.min(Math.round(l4*0.5+s1.ls*0.3+sd.ls*0.2), 100);
  const sf = Math.min(Math.round(sh4*0.5+s1.ss*0.3+sd.ss*0.2), 100);

  let direction=null, score=0;
  if(lf>=55&&lf>sf){direction="LONG";score=lf;}
  else if(sf>=55&&sf>lf){direction="SHORT";score=sf;}

  const atr = s4.atr;
  const p   = s4.price;
  const tp1 = direction==="LONG"?+(p+1.5*atr).toFixed(6):+(p-1.5*atr).toFixed(6);
  const tp2 = direction==="LONG"?+(p+2.5*atr).toFixed(6):+(p-2.5*atr).toFixed(6);
  const tp3 = direction==="LONG"?+(p+4.0*atr).toFixed(6):+(p-4.0*atr).toFixed(6);
  const sl  = direction==="LONG"?+(p-1.2*atr).toFixed(6):+(p+1.2*atr).toFixed(6);
  const rr  = +(Math.abs(tp2-p)/Math.abs(p-sl)).toFixed(2);

  return {
    symbol:sym, direction, score,
    price:p, tp1, tp2, tp3, sl, rr,
    rsi:s4.rsiV, funding, oi, ls,
    volRatio:s4.volRat,
    lScore:lf, sScore:sf,
  };
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderSignalCard(d) {
  const dir = d.direction.toLowerCase();
  const sc  = scoreClass(d.score);
  const fr  = d.funding;
  const frColor = fundingColor(fr);
  return `
    <div class="signal-card ${dir}">
      <div class="card-header">
        <div class="pair-name">${d.symbol.replace("USDT","")}</div>
        <div class="direction-badge ${dir}">${d.direction==="LONG"?"↑ LONG":"↓ SHORT"}</div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-label"><span>Confianza</span><span>${d.score}/100</span></div>
        <div class="score-bar"><div class="score-fill ${sc}" style="width:${d.score}%"></div></div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">
        Entrada: <strong style="color:#e2e8f0">${fmtPrice(d.price)}</strong>
        &nbsp;·&nbsp; R:R <span class="rr-badge">1:${d.rr}</span>
      </div>
      <div style="margin-bottom:10px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px">Take Profits</div>
        <div class="tp-levels">
          <span class="tp-chip">TP1 ${fmtPrice(d.tp1)} <small style="opacity:.6">50%</small></span>
          <span class="tp-chip">TP2 ${fmtPrice(d.tp2)} <small style="opacity:.6">30%</small></span>
          <span class="tp-chip">TP3 ${fmtPrice(d.tp3)} <small style="opacity:.6">20%</small></span>
          <span class="sl-chip">SL ${fmtPrice(d.sl)}</span>
        </div>
      </div>
      <div class="metrics">
        <div class="metric"><span class="k">RSI 4H</span><span class="v">${d.rsi}</span></div>
        <div class="metric"><span class="k">Funding</span><span class="v" style="color:${frColor}">${fr>0?"+":""}${fr.toFixed(4)}%</span></div>
        <div class="metric"><span class="k">OI</span><span class="v ${d.oi>0?"up":"down"}">${d.oi>0?"+":""}${d.oi}%</span></div>
        <div class="metric"><span class="k">L/S</span><span class="v">${d.ls.long}% / ${d.ls.short}%</span></div>
        <div class="metric"><span class="k">Volumen</span><span class="v">${d.volRatio}x</span></div>
        <div class="metric"><span class="k">TF</span><span class="v" style="color:var(--muted)">4H</span></div>
      </div>
    </div>`;
}

function renderWatchRow(d, ticker) {
  const chg = ticker ? +ticker.priceChangePercent : 0;
  const rsiC = d.rsi<40?"rsi-os":d.rsi>60?"rsi-ob":"rsi-mid";
  const fr = d.funding;
  const scoreVal = Math.max(d.lScore||0, d.sScore||0);
  const scoreC = scoreVal>=70?"up":scoreVal>=50?"neutral":"down";
  return `
    <div class="watch-row">
      <div class="pair-cell">${d.symbol.replace("USDT","")}</div>
      <div class="price-cell">${fmtPrice(d.price)}</div>
      <div class="rsi-col"><span class="rsi-chip ${rsiC}">${d.rsi}</span></div>
      <div>${fmtChange(chg)}</div>
      <div class="funding-col funding-cell" style="color:${fundingColor(fr)}">${fr>0?"+":""}${fr.toFixed(4)}%</div>
      <div class="<span class="${scoreC}">${scoreVal}</span></div>
    </div>`;
}

// ── Market bar ────────────────────────────────────────────────────────────────
async function loadMarketBar() {
  try {
    const [btc,eth,sol] = await Promise.all([
      fetchTicker("BTCUSDT"), fetchTicker("ETHUSDT"), fetchTicker("SOLUSDT")
    ]);
    const [fBTC, fETH, fSOL] = await Promise.all([
      fetchFunding("BTCUSDT"), fetchFunding("ETHUSDT"), fetchFunding("SOLUSDT")
    ]);
    const items = [
      {label:"BTC",  price:+btc.lastPrice, chg:+btc.priceChangePercent},
      {label:"ETH",  price:+eth.lastPrice, chg:+eth.priceChangePercent},
      {label:"SOL",  price:+sol.lastPrice, chg:+sol.priceChangePercent},
      {label:"Fund BTC", value:`${fBTC>0?"+":""}${fBTC.toFixed(4)}%`, color:fundingColor(fBTC)},
      {label:"Fund ETH", value:`${fETH>0?"+":""}${fETH.toFixed(4)}%`, color:fundingColor(fETH)},
    ];
    document.getElementById("marketBar").innerHTML = items.map(i=>
      i.value ? `<div class="market-item"><div class="label">${i.label}</div><div class="value" style="color:${i.color}">${i.value}</div></div>`
              : `<div class="market-item"><div class="label">${i.label}</div><div class="value">${fmtPrice(i.price)}</div><div class="change ${i.chg>0?"up":i.chg<0?"down":"neutral"}">${i.chg>0?"+":""}${i.chg.toFixed(2)}%</div></div>`
    ).join("");
  } catch(e) { console.error(e); }
}

// ── Main scan ─────────────────────────────────────────────────────────────────
async function runScan() {
  document.getElementById("statusDot").style.background = "#f59e0b";
  const results = await Promise.allSettled(PAIRS.map(sym => analyzePair(sym)));
  const all = results.filter(r=>r.status==="fulfilled"&&r.value).map(r=>r.value);
  const signals = all.filter(d=>d.direction&&d.score>=55).sort((a,b)=>b.score-a.score);

  // Signals grid
  const grid = document.getElementById("signalsGrid");
  if(signals.length===0){
    grid.innerHTML = `<div class="empty-state"><div class="icon">📡</div><p>Sin setups activos ahora mismo.<br/>El mercado está en zona neutral.</p></div>`;
  } else {
    grid.innerHTML = signals.map(renderSignalCard).join("");
  }

  // Watchlist
  const tickers = await Promise.allSettled(PAIRS.map(s=>fetchTicker(s)));
  const tickerMap = {};
  tickers.forEach((r,i)=>{ if(r.status==="fulfilled") tickerMap[PAIRS[i]]=r.value; });
  document.getElementById("watchlistBody").innerHTML = all.map(d=>renderWatchRow(d,tickerMap[d.symbol])).join("");

  // Status
  document.getElementById("statusDot").style.background = "#22c55e";
  document.getElementById("updateTime").textContent = "Actualizado: " + new Date().toLocaleTimeString("es-MX");
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadMarketBar(), runScan()]);
  setInterval(async()=>{ await Promise.all([loadMarketBar(), runScan()]); }, 5*60*1000);
}
init();
</script>
