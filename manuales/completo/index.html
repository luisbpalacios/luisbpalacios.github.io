<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual Completo de Gestión de Riesgo — Luis B. Palacios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--orange:#F2561D;--dark:#0D0D0D;--dark-2:#141414;--dark-3:#1A1A1A;--dark-4:#222;--gray:#888;--green:#4CAF50;}
body{font-family:'Inter',sans-serif;background:var(--dark);color:#fff;min-height:100vh;}

/* ── GATE ── */
#gate{position:fixed;inset:0;background:var(--dark);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.gate-box{width:100%;max-width:440px;text-align:center;padding-bottom:32px;}
.gate-glow{position:fixed;top:30%;left:50%;transform:translateX(-50%);width:500px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(242,86,29,0.07),transparent 65%);pointer-events:none;}
.gate-tabs{display:flex;gap:8px;margin-bottom:24px;background:#141414;border:1px solid #222;border-radius:14px;padding:4px;}
.gate-tab{flex:1;padding:10px 12px;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.2s;background:transparent;color:#555;}
.gate-tab.active{background:var(--orange);color:#fff;box-shadow:0 2px 10px rgba(242,86,29,0.3);}
.gate-amount{font-size:2rem;font-weight:900;color:#fff;margin-bottom:4px;}
.gate-amount span{font-size:0.9rem;color:var(--gray);font-weight:600;}
.gate-qr-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin:20px 0;}
#gate-qr{background:#fff;padding:14px;border-radius:14px;display:inline-block;}
.gate-qr-label{font-size:0.72rem;color:#555;font-weight:500;}
.gate-wallet-wrap{background:#141414;border:1px solid #222;border-radius:12px;padding:14px 16px;margin-bottom:16px;text-align:left;}
.gate-wallet-label{font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#555;margin-bottom:8px;}
.gate-wallet-row{display:flex;align-items:center;gap:8px;}
.gate-wallet-addr{font-size:0.72rem;color:#aaa;font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gate-copy-btn{background:#222;border:1px solid #333;color:#aaa;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:0.85rem;transition:all 0.2s;flex-shrink:0;}
.gate-copy-btn:hover{background:var(--orange);color:#fff;border-color:var(--orange);}
.gate-divider{height:1px;background:#1a1a1a;margin:16px 0;}
.gate-tx-label{font-size:0.75rem;font-weight:700;color:#888;margin-bottom:10px;text-align:left;}
.gate-tx-wrap{margin-bottom:10px;}
.gate-tx-input{width:100%;background:#141414;border:1.5px solid #2a2a2a;border-radius:12px;padding:13px 16px;color:#fff;font-family:monospace;font-size:0.78rem;outline:none;transition:border-color 0.2s;}
.gate-tx-input:focus{border-color:rgba(242,86,29,0.5);}
.gate-tx-input::placeholder{color:#444;font-family:'Inter',sans-serif;}
.gate-tx-status{min-height:28px;margin-bottom:10px;font-size:0.8rem;font-weight:600;border-radius:8px;padding:0;transition:all 0.3s;}
.gate-tx-status.loading{color:#aaa;padding:8px 12px;background:#141414;}
.gate-tx-status.success{color:#4CAF50;padding:8px 12px;background:rgba(76,175,80,0.08);border:1px solid rgba(76,175,80,0.2);}
.gate-tx-status.error{color:#f44336;padding:8px 12px;background:rgba(244,67,54,0.08);border:1px solid rgba(244,67,54,0.2);}
.gate-btn{width:100%;background:var(--orange);color:#fff;border:none;border-radius:14px;padding:15px;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:800;cursor:pointer;transition:opacity 0.2s,transform 0.15s;box-shadow:0 4px 20px rgba(242,86,29,0.3);margin-bottom:10px;}
.gate-btn:hover{opacity:0.9;transform:translateY(-2px);}
.gate-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.gate-solscan-link{display:inline-block;font-size:0.73rem;color:#444;text-decoration:none;margin-bottom:4px;}
.gate-solscan-link:hover{color:var(--orange);}
.gate-lock{font-size:3rem;margin-bottom:12px;display:block;}
.gate-sub{font-size:0.84rem;color:var(--gray);line-height:1.6;margin-bottom:8px;}
.gate-input-wrap{margin-bottom:10px;}
.gate-input{width:100%;background:#141414;border:1.5px solid #2a2a2a;border-radius:14px;padding:15px 20px;color:#fff;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;text-align:center;letter-spacing:0.12em;outline:none;transition:border-color 0.2s;}
.gate-input:focus{border-color:rgba(242,86,29,0.5);}
.gate-input.error{border-color:#f44336;animation:shake 0.35s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.gate-error{font-size:0.78rem;color:#f44336;font-weight:600;min-height:18px;margin-bottom:10px;}
.gate-hint{margin-top:16px;font-size:0.73rem;color:#333;}
.gate-hint a{color:var(--orange);text-decoration:none;}

/* ── CONTENT (hidden until unlocked) ── */
#content{display:none;}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:rgba(13,13,13,0.92);backdrop-filter:blur(12px);border-bottom:1px solid #1a1a1a;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
.nav-back{display:flex;align-items:center;gap:8px;color:var(--gray);font-size:0.82rem;font-weight:600;text-decoration:none;transition:color 0.2s;}
.nav-back:hover{color:#fff;}
.nav-badge{font-size:0.7rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;background:rgba(242,86,29,0.12);color:var(--orange);border:1px solid rgba(242,86,29,0.3);padding:4px 12px;border-radius:20px;}

/* ── HERO ── */
.hero{max-width:740px;margin:0 auto;padding:64px 24px 48px;text-align:center;position:relative;}
@media(max-width:600px){.hero{padding:40px 24px 32px;}}
.hero-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:500px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(242,86,29,0.07),transparent 65%);pointer-events:none;}
.hero-tag{display:inline-block;background:rgba(242,86,29,0.1);border:1px solid rgba(242,86,29,0.3);color:var(--orange);font-size:0.72rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;padding:6px 16px;border-radius:20px;margin-bottom:24px;}
.hero-title{font-size:clamp(2rem,5vw,3.2rem);font-weight:900;line-height:1.1;letter-spacing:-1px;margin-bottom:16px;}
.hero-title span{color:var(--orange);}
.hero-desc{font-size:1rem;color:var(--gray);line-height:1.7;max-width:520px;margin:0 auto 32px;}
.hero-author{display:flex;align-items:center;justify-content:center;gap:12px;}
.hero-author-dot{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#F2561D,#ff8c42);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.85rem;color:#fff;flex-shrink:0;}
.hero-author-name{font-size:0.85rem;font-weight:700;color:#fff;text-align:left;}
.hero-author-sub{font-size:0.72rem;color:var(--gray);}
.hero-divider{width:60px;height:3px;background:var(--orange);border-radius:2px;margin:40px auto 0;}
.hero-includes{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:28px;}
.hero-inc-item{display:flex;align-items:center;gap:6px;font-size:0.75rem;color:#ccc;font-weight:600;background:var(--dark-3);border:1px solid #222;padding:6px 12px;border-radius:20px;}
.hero-inc-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0;}

/* ── CONTENT AREA ── */
.content{max-width:740px;margin:0 auto;padding:0 0 80px;}
@media(max-width:600px){.content{padding:0 0 48px;}}
.section{margin-bottom:56px;max-width:740px;margin-left:auto;margin-right:auto;padding:0 24px;}
@media(max-width:600px){.section{margin-bottom:40px;}}
.section-tag{font-size:0.68rem;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--orange);margin-bottom:10px;}
.section-title{font-size:1.6rem;font-weight:900;letter-spacing:-0.4px;margin-bottom:8px;line-height:1.2;}
.section-title span{color:var(--orange);}
.section-intro{font-size:0.88rem;color:var(--gray);line-height:1.75;margin-bottom:28px;}

/* ── INTRO CARDS ── */
.intro-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:520px){.intro-grid{grid-template-columns:1fr;}}
.intro-card{background:var(--dark-3);border:1px solid #1e1e1e;border-radius:14px;padding:20px 18px;}
.intro-card-icon{font-size:1.6rem;margin-bottom:10px;}
.intro-card-title{font-size:0.9rem;font-weight:800;color:#fff;margin-bottom:6px;}
.intro-card-desc{font-size:0.8rem;color:#888;line-height:1.65;}
.intro-card.highlight{background:linear-gradient(135deg,#1a120a,#141414);border-color:rgba(242,86,29,0.25);}

/* ── RIESGOS ── */
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:520px){.risk-grid{grid-template-columns:1fr;}}
.risk-card{background:var(--dark-3);border:1px solid #1e1e1e;border-radius:14px;padding:18px;cursor:pointer;transition:border-color 0.2s,background 0.2s;position:relative;overflow:hidden;}
.risk-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;}
.risk-card:hover{background:#1d1d1d;}
.risk-card.open{border-color:rgba(242,86,29,0.3);}
.risk-header{display:flex;align-items:center;gap:10px;}
.risk-icon{font-size:1.3rem;flex-shrink:0;}
.risk-name{font-size:0.88rem;font-weight:800;color:#fff;flex:1;line-height:1.2;}
.risk-level{font-size:0.62rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:5px;flex-shrink:0;}
.lvl-alto{background:rgba(244,67,54,0.12);color:#f44336;}
.lvl-muy-alto{background:rgba(244,67,54,0.18);color:#d32f2f;}
.lvl-medio{background:rgba(255,152,0,0.12);color:#FF9800;}
.lvl-variable{background:rgba(156,39,176,0.12);color:#CE93D8;}
.risk-body{max-height:0;overflow:hidden;transition:max-height 0.3s ease;}
.risk-card.open .risk-body{max-height:200px;}
@media(max-width:520px){.risk-card.open .risk-body{max-height:280px;}}
.risk-def{font-size:0.81rem;color:#999;line-height:1.7;padding-top:12px;border-top:1px solid #1a1a1a;margin-top:12px;}
.risk-tip{font-size:0.75rem;font-weight:700;margin-top:8px;}

/* ── ESTRATEGIA 25% ── */
.quarters-visual{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
@media(max-width:480px){.quarters-visual{grid-template-columns:1fr 1fr;}}
.quarter-block{border-radius:14px;padding:20px 14px;text-align:center;position:relative;overflow:hidden;}
.quarter-block.active{background:linear-gradient(135deg,#1a120a,#141414);border:1.5px solid rgba(242,86,29,0.4);}
.quarter-block.reserve{background:var(--dark-3);border:1px solid #1e1e1e;}
.quarter-tag{font-size:0.62rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.active .quarter-tag{color:var(--orange);}
.reserve .quarter-tag{color:#444;}
.quarter-pct{font-size:1.8rem;font-weight:900;margin-bottom:4px;}
.active .quarter-pct{color:var(--orange);}
.reserve .quarter-pct{color:#333;}
.quarter-label{font-size:0.72rem;font-weight:600;}
.active .quarter-label{color:#ccc;}
.reserve .quarter-label{color:#444;}
.quarters-explain{display:flex;flex-direction:column;gap:12px;}
.qe-row{display:flex;align-items:flex-start;gap:14px;background:var(--dark-3);border:1px solid #1e1e1e;border-left:3px solid var(--orange);border-radius:12px;padding:16px 18px;}
.qe-num{font-size:1.6rem;font-weight:900;color:rgba(242,86,29,0.12);line-height:1;flex-shrink:0;width:32px;}
.qe-title{font-size:0.88rem;font-weight:800;color:#fff;margin-bottom:4px;}
.qe-desc{font-size:0.79rem;color:#888;line-height:1.65;}

/* ── PSICOLOGÍA ── */
.psych-grid{display:flex;flex-direction:column;gap:14px;}
.psych-card{background:var(--dark-3);border:1px solid #1e1e1e;border-radius:16px;padding:22px 20px;position:relative;overflow:hidden;}
.psych-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.fomo-c::before{background:#FF9800;}.revenge-c::before{background:#f44336;}.over-c::before{background:#CE93D8;}
.psych-icon{font-size:2rem;margin-bottom:10px;}
.psych-name{font-size:1.05rem;font-weight:900;color:#fff;margin-bottom:2px;}
.fomo-c .psych-name{color:#FF9800;}.revenge-c .psych-name{color:#f44336;}.over-c .psych-name{color:#CE93D8;}
.psych-full{font-size:0.72rem;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.psych-desc{font-size:0.82rem;color:#888;line-height:1.7;margin-bottom:14px;}
.psych-signals-label{font-size:0.68rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:#555;margin-bottom:8px;}
.psych-signals{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.psych-signal{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:#777;}
.psych-signal::before{content:'›';font-weight:900;font-size:1rem;flex-shrink:0;}
.fomo-c .psych-signal::before{color:#FF9800;}.revenge-c .psych-signal::before{color:#f44336;}.over-c .psych-signal::before{color:#CE93D8;}
.psych-fix{font-size:0.8rem;color:#aaa;line-height:1.6;background:#111;border-radius:10px;padding:12px 14px;}
.psych-fix strong{color:#4CAF50;}

/* ── CHECKLIST ── */
.semaforo-wrap{margin-bottom:20px;background:var(--dark-3);border:1px solid #1e1e1e;border-radius:16px;padding:20px 22px;}
.semaforo-top{display:flex;align-items:center;gap:16px;margin-bottom:14px;}
.semaforo-ring{width:52px;height:52px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all 0.4s;position:relative;}
.semaforo-ring::after{content:'';position:absolute;inset:-3px;border-radius:50%;transition:box-shadow 0.4s;}
.semaforo-info{flex:1;}
.semaforo-label{font-size:0.72rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;transition:color 0.4s;}
.semaforo-desc{font-size:0.8rem;color:var(--gray);line-height:1.5;}
.semaforo-count{font-size:1.4rem;font-weight:900;color:#fff;flex-shrink:0;text-align:right;line-height:1;}
.semaforo-count span{font-size:0.7rem;color:var(--gray);font-weight:600;display:block;}
.semaforo-bar-track{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;}
.semaforo-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease,background 0.4s;width:0%;}
.s0 .semaforo-ring{background:rgba(244,67,54,0.1);}.s0 .semaforo-ring::after{box-shadow:0 0 14px rgba(244,67,54,0.4);}.s0 .semaforo-label{color:#f44336;}.s0 .semaforo-bar-fill{background:#f44336;}
.s1 .semaforo-ring{background:rgba(255,87,34,0.1);}.s1 .semaforo-ring::after{box-shadow:0 0 14px rgba(255,87,34,0.3);}.s1 .semaforo-label{color:#FF5722;}.s1 .semaforo-bar-fill{background:#FF5722;}
.s2 .semaforo-ring{background:rgba(255,152,0,0.1);}.s2 .semaforo-ring::after{box-shadow:0 0 14px rgba(255,152,0,0.3);}.s2 .semaforo-label{color:#FF9800;}.s2 .semaforo-bar-fill{background:#FF9800;}
.s3 .semaforo-ring{background:rgba(255,193,7,0.1);}.s3 .semaforo-ring::after{box-shadow:0 0 14px rgba(255,193,7,0.25);}.s3 .semaforo-label{color:#FFC107;}.s3 .semaforo-bar-fill{background:#FFC107;}
.s4 .semaforo-ring{background:rgba(139,195,74,0.1);}.s4 .semaforo-ring::after{box-shadow:0 0 14px rgba(139,195,74,0.25);}.s4 .semaforo-label{color:#8BC34A;}.s4 .semaforo-bar-fill{background:#8BC34A;}
.s5 .semaforo-ring{background:rgba(76,175,80,0.15);}.s5 .semaforo-ring::after{box-shadow:0 0 18px rgba(76,175,80,0.5);}.s5 .semaforo-label{color:#4CAF50;}.s5 .semaforo-bar-fill{background:#4CAF50;}
.checklist{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:520px){.checklist{grid-template-columns:1fr;}}
.check-item{display:flex;align-items:center;gap:14px;background:var(--dark-3);border:1px solid #1e1e1e;border-radius:12px;padding:14px 18px;cursor:pointer;transition:background 0.2s,border-color 0.2s;user-select:none;}
.check-item:hover{background:#1f1f1f;}
.check-item.checked{background:rgba(76,175,80,0.06);border-color:rgba(76,175,80,0.25);}
.check-box{width:22px;height:22px;border:2px solid #333;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.check-item.checked .check-box{background:#4CAF50;border-color:#4CAF50;}
.check-tick{display:none;color:#fff;font-size:13px;font-weight:900;line-height:1;}
.check-item.checked .check-tick{display:block;}
.check-text{font-size:0.83rem;color:#ccc;font-weight:500;flex:1;transition:color 0.2s;}
.check-item.checked .check-text{color:#fff;}
.check-cat{font-size:0.65rem;font-weight:800;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;}
.cat-analysis{background:rgba(76,175,80,0.1);color:#4CAF50;}
.cat-risk{background:rgba(255,152,0,0.1);color:#FF9800;}
.cat-capital{background:rgba(242,86,29,0.1);color:var(--orange);}
.cat-mental{background:rgba(156,39,176,0.1);color:#CE93D8;}

/* ── ERRORES ── */
.errors-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:520px){.errors-grid{grid-template-columns:1fr;}}
.err-card{background:var(--dark-3);border:1px solid #1e1e1e;border-radius:14px;padding:18px;}
.err-card.full{grid-column:1/-1;}
.err-num{font-size:0.65rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--orange);margin-bottom:8px;}
.err-title{font-size:0.9rem;font-weight:800;color:#fff;margin-bottom:6px;}
.err-desc{font-size:0.79rem;color:#777;line-height:1.65;}
.err-fix{margin-top:10px;font-size:0.75rem;font-weight:700;color:#4CAF50;}

/* ── RESUMEN FINAL ── */
.final-rules{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;}
@media(max-width:520px){.final-rules{grid-template-columns:1fr;gap:10px;}}
.final-rule{position:relative;background:var(--dark-3);border:1px solid #1e1e1e;border-radius:18px;padding:24px 20px;overflow:hidden;transition:border-color 0.2s,transform 0.2s;}
.final-rule:hover{border-color:rgba(242,86,29,0.35);transform:translateY(-2px);}
.final-rule.full{grid-column:1/-1;}
.final-rule-glow{position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(242,86,29,0.08),transparent 65%);pointer-events:none;}
.final-rule-num{font-size:3.5rem;font-weight:900;color:rgba(242,86,29,0.08);line-height:1;margin-bottom:12px;}
.final-rule-icon{font-size:1.4rem;margin-bottom:10px;display:block;}
.final-rule-title{font-size:0.92rem;font-weight:900;color:#fff;margin-bottom:6px;line-height:1.3;}
.final-rule-title span{color:var(--orange);}
.final-rule-desc{font-size:0.78rem;color:#777;line-height:1.65;}
.final-cta-box{background:var(--dark-2);border:1.5px solid rgba(242,86,29,0.25);border-radius:20px;padding:36px 28px;text-align:center;position:relative;overflow:hidden;}
.final-cta-glow{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:400px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(242,86,29,0.08),transparent 65%);pointer-events:none;}
.final-cta-tag{display:inline-block;background:rgba(242,86,29,0.1);border:1px solid rgba(242,86,29,0.3);color:var(--orange);font-size:0.68rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:14px;}
.final-cta-title{font-size:1.3rem;font-weight:900;line-height:1.2;margin-bottom:10px;}
.final-cta-desc{font-size:0.84rem;color:var(--gray);line-height:1.7;max-width:380px;margin:0 auto 24px;}
.final-cta-btn{display:inline-block;background:var(--orange);color:#fff;font-size:0.95rem;font-weight:800;padding:14px 36px;border-radius:50px;text-decoration:none;transition:opacity 0.2s,transform 0.15s;box-shadow:0 6px 24px rgba(242,86,29,0.3);}
.final-cta-btn:hover{opacity:0.9;transform:translateY(-2px);}
.final-cta-sub{margin-top:16px;font-size:0.75rem;color:#333;}
.final-cta-sub a{color:var(--orange);text-decoration:none;}

/* ── FÓRMULA ── */
.formula-box{background:linear-gradient(135deg,#1a120a,#141414);border:1.5px solid rgba(242,86,29,0.3);border-radius:16px;padding:24px 22px;text-align:center;margin-bottom:20px;}
.formula-label{font-size:0.7rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:rgba(242,86,29,0.7);margin-bottom:12px;}
.formula-main{font-size:clamp(1rem,3vw,1.3rem);font-weight:900;color:#fff;line-height:1.4;}
.formula-main span{color:var(--orange);}

/* ── CAPITAL EXAMPLES ── */
.capital-examples{background:var(--dark-3);border:1px solid #1e1e1e;border-radius:16px;padding:20px 22px;}
.cap-ex-title{font-size:0.7rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:14px;}
.cap-ex-grid{display:flex;flex-direction:column;gap:10px;}
.cap-ex-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;background:#111;border-radius:10px;padding:12px 14px;}
@media(max-width:520px){.cap-ex-row{grid-template-columns:1fr 1fr;gap:8px;}}
.cap-ex-cell{}
.cap-ex-cell-label{font-size:0.62rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#555;margin-bottom:3px;}
.cap-ex-cell-val{font-size:0.88rem;font-weight:800;color:#fff;}
.cap-ex-cell-val.loss{color:#f44336;}.cap-ex-cell-val.gain{color:#4CAF50;}

/* ── SL RULES ── */
.sl-rules{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
.sl-rule{display:flex;align-items:flex-start;gap:16px;background:var(--dark-3);border:1px solid #1e1e1e;border-left:3px solid var(--orange);border-radius:14px;padding:18px 20px;}
.sl-rule-num{font-size:1.8rem;font-weight:900;color:rgba(242,86,29,0.12);line-height:1;flex-shrink:0;width:36px;}
.sl-rule-title{font-size:0.9rem;font-weight:800;color:#fff;margin-bottom:4px;}
.sl-rule-title span{color:var(--orange);}
.sl-rule-desc{font-size:0.8rem;color:#888;line-height:1.65;}

/* ── SL EXAMPLE ── */
.sl-example-box{background:var(--dark-3);border:1px solid #1e1e1e;border-radius:16px;padding:22px;}
.sl-ex-label{font-size:0.7rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:18px;}
.sl-ex-timeline{display:flex;flex-direction:column;gap:0;}
.sl-ex-item{display:flex;align-items:flex-start;gap:14px;padding-bottom:16px;position:relative;}
.sl-ex-item:last-child{padding-bottom:0;}
.sl-ex-item:not(:last-child)::before{content:'';position:absolute;left:9px;top:20px;bottom:0;width:2px;background:#1e1e1e;}
.sl-ex-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;margin-top:2px;border:2px solid;}
.entry .sl-ex-dot{background:rgba(66,165,245,0.2);border-color:#42a5f5;}
.sl .sl-ex-dot{background:rgba(244,67,54,0.2);border-color:#f44336;}
.tp1 .sl-ex-dot{background:rgba(255,193,7,0.2);border-color:#FFC107;}
.tp2 .sl-ex-dot{background:rgba(76,175,80,0.2);border-color:#4CAF50;}
.sl-ex-name{font-size:0.7rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--gray);margin-bottom:3px;}
.sl-ex-price{font-size:1rem;font-weight:900;color:#fff;margin-bottom:2px;}
.sl-ex-price span{font-size:0.78rem;font-weight:700;}
.entry .sl-ex-price span{color:#42a5f5;}
.sl .sl-ex-price span{color:#f44336;}
.tp1 .sl-ex-price span{color:#FFC107;}
.tp2 .sl-ex-price span{color:#4CAF50;}
.sl-ex-note{font-size:0.75rem;color:#666;}

/* ── TAKE PROFIT ── */
.tp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
@media(max-width:520px){.tp-grid{grid-template-columns:1fr;}}
.tp-card{background:var(--dark-3);border:1px solid #1e1e1e;border-radius:14px;padding:18px;text-align:center;}
.tp-badge{font-size:0.65rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:10px;}
.tp1-c .tp-badge{background:rgba(255,193,7,0.12);color:#FFC107;border:1px solid rgba(255,193,7,0.2);}
.tp2-c .tp-badge{background:rgba(255,152,0,0.12);color:#FF9800;border:1px solid rgba(255,152,0,0.2);}
.tp3-c .tp-badge{background:rgba(76,175,80,0.12);color:#4CAF50;border:1px solid rgba(76,175,80,0.2);}
.tp-ratio{font-size:1.2rem;font-weight:900;color:#fff;margin-bottom:8px;}
.tp-desc{font-size:0.76rem;color:#888;line-height:1.6;margin-bottom:10px;}
.tp-rule{font-size:0.75rem;font-weight:700;padding:6px 10px;border-radius:8px;background:#111;}
.tp1-c .tp-rule{color:#FFC107;}.tp2-c .tp-rule{color:#FF9800;}.tp3-c .tp-rule{color:#4CAF50;}

/* ── WINRATE ── */
.winrate-box{background:var(--dark-3);border:1px solid #1e1e1e;border-radius:16px;padding:22px;}
.wr-title{font-size:0.82rem;font-weight:800;color:#fff;margin-bottom:14px;}
.wr-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.wr-row{display:flex;align-items:center;gap:12px;}
.wr-label{font-size:0.75rem;color:var(--gray);width:100px;flex-shrink:0;}
.wr-bar-track{flex:1;height:8px;background:#111;border-radius:4px;overflow:hidden;}
.wr-bar-fill{height:100%;border-radius:4px;transition:width 1s ease;}
.wr-val{font-size:0.75rem;font-weight:800;width:60px;text-align:right;flex-shrink:0;}
.wr-note{font-size:0.78rem;color:#666;line-height:1.65;font-style:italic;}

function renderChart(capital,entry,cLev,slPrice,slLoss,liqPrice,slPct,tp1Price,tp1Gain,tp2Price,tp2Gain,tp3Price,tp3Gain){
  var chartDiv=document.getElementById('c-chart');
  if(!chartDiv)return;
  var W=360,H=260,PL=52,PR=115,CW=W-PL-PR,PAD=18;
  var minP=liqPrice*0.997,maxP=tp3Price*1.003,range=maxP-minP;
  function py(p){return PAD+((maxP-p)/range)*H;}
  var entryY=py(entry),tp1Y=py(tp1Price),tp2Y=py(tp2Price),tp3Y=py(tp3Price),slY=py(slPrice),liqY=py(liqPrice);
  var levels=[
    {y:tp3Y,label:'TP3',color:'#43a047',pnl:'+'+fmtUSD(tp3Gain),pct:'+'+(slPct*5*100).toFixed(0)+'%',w:2,dash:'5,3'},
    {y:tp2Y,label:'TP2',color:'#66bb6a',pnl:'+'+fmtUSD(tp2Gain),pct:'+'+(slPct*3*100).toFixed(0)+'%',w:1.5,dash:'5,3'},
    {y:tp1Y,label:'TP1',color:'#a5d6a7',pnl:'+'+fmtUSD(tp1Gain),pct:'+'+(slPct*2*100).toFixed(0)+'%',w:1.5,dash:'5,3'},
    {y:entryY,label:'ENTRADA',color:'#F2561D',pnl:'$'+fmt(entry),pct:'',w:2,dash:'0'},
    {y:slY,label:'SL',color:'#ef5350',pnl:'-'+fmtUSD(slLoss),pct:'-'+(slPct*100).toFixed(1)+'%',w:1.5,dash:'5,3'},
    {y:liqY,label:'LIQ',color:'#b71c1c',pnl:'LIQ',pct:'-'+(1/cLev*100).toFixed(0)+'%',w:1,dash:'3,2'}
  ];
  var totalH=H+PAD*2,midX=PL+CW/2;
  var svg='<svg viewBox="0 0 '+W+' '+totalH+'" width="100%" xmlns="http://www.w3.org/2000/svg">';
  svg+='<rect width="'+W+'" height="'+totalH+'" fill="#0d0d0d"/>';
  svg+='<rect x="'+PL+'" y="'+tp3Y+'" width="'+CW+'" height="'+(entryY-tp3Y)+'" fill="rgba(76,175,80,0.07)"/>';
  svg+='<rect x="'+PL+'" y="'+entryY+'" width="'+CW+'" height="'+(slY-entryY)+'" fill="rgba(244,67,54,0.07)"/>';
  svg+='<line x1="'+midX+'" y1="'+tp3Y+'" x2="'+midX+'" y2="'+entryY+'" stroke="rgba(76,175,80,0.35)" stroke-width="2"/>';
  svg+='<line x1="'+midX+'" y1="'+entryY+'" x2="'+midX+'" y2="'+slY+'" stroke="rgba(244,67,54,0.35)" stroke-width="2"/>';
  svg+='<circle cx="'+midX+'" cy="'+entryY+'" r="6" fill="#F2561D" opacity="0.9"/>';
  svg+='<circle cx="'+midX+'" cy="'+entryY+'" r="3" fill="#fff"/>';
  [{y:tp1Y,c:'#a5d6a7'},{y:tp2Y,c:'#66bb6a'},{y:tp3Y,c:'#43a047'}].forEach(function(d){
    svg+='<circle cx="'+midX+'" cy="'+d.y+'" r="4" fill="'+d.c+'"/>';
  });
  svg+='<circle cx="'+midX+'" cy="'+slY+'" r="4" fill="#ef5350"/>';
  levels.forEach(function(lv){
    var da=lv.dash==='0'?'':' stroke-dasharray="'+lv.dash+'"';
    svg+='<line x1="'+PL+'" y1="'+lv.y+'" x2="'+(PL+CW)+'" y2="'+lv.y+'" stroke="'+lv.color+'" stroke-width="'+lv.w+'"'+da+' opacity="0.85"/>';
    svg+='<text x="'+(PL-5)+'" y="'+(lv.y+4)+'" text-anchor="end" fill="'+lv.color+'" font-size="9" font-family="monospace" font-weight="700">'+lv.label+'</text>';
    svg+='<text x="'+(PL+CW+8)+'" y="'+(lv.y+1)+'" text-anchor="start" fill="'+lv.color+'" font-size="9" font-family="monospace" font-weight="700">'+lv.pnl+'</text>';
    if(lv.pct) svg+='<text x="'+(PL+CW+8)+'" y="'+(lv.y+12)+'" text-anchor="start" fill="'+lv.color+'" font-size="8" font-family="monospace" opacity="0.6">'+lv.pct+'</text>';
  });
  svg+='</svg>';
  chartDiv.innerHTML=svg;
}
let cLev=2;
function selectLev(btn){
  document.querySelectorAll('.calc-lev-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  cLev=parseInt(btn.dataset.lev);
  var w=document.getElementById('c-warn');
  if(w) w.style.display=cLev>=10?'flex':'none';
  calcUpdate();
}
function calcUpdate(){
  var capital=parseFloat(document.getElementById('c-capital').value);
  var entry=parseFloat(document.getElementById('c-entry').value);
  var slInput=parseFloat(document.getElementById('c-sl').value);
  var res=document.getElementById('c-results');
  var chartDiv=document.getElementById('c-chart');
  if(!capital||!entry||capital<=0||entry<=0){
    res.innerHTML='<div class="calc-empty">\uD83D\uDC46 Ingresa tu capital y precio de entrada</div>';
    if(chartDiv) chartDiv.innerHTML='';
    return;
  }
  var slPctRaw=(isNaN(slInput)||slInput<=0)?3:slInput;
  var slPct=slPctRaw/100;
  var liqPct=1/cLev;
  var liqPrice=entry*(1-liqPct);
  if(slPct>=liqPct){
    res.innerHTML='<div class="calc-error-card"><strong>\uD83D\uDEA8 SL imposible con '+cLev+'x</strong>Tu liquidaci\u00F3n ocurre a \u2212'+(liqPct*100).toFixed(1)+'%. Reduce el SL o el apalancamiento.</div>';
    if(chartDiv) chartDiv.innerHTML='';
    return;
  }
  var pos=capital*cLev;
  var slPrice=entry*(1-slPct);
  var slLoss=capital*slPct*cLev;
  var slLossPct=(slPct*cLev*100).toFixed(0);
  var tp1Pct=slPct*2,tp1Price=entry*(1+tp1Pct),tp1Gain=capital*tp1Pct*cLev;
  var tp2Pct=slPct*3,tp2Price=entry*(1+tp2Pct),tp2Gain=capital*tp2Pct*cLev;
  var tp3Pct=slPct*5,tp3Price=entry*(1+tp3Pct),tp3Gain=capital*tp3Pct*cLev;
  res.innerHTML=
    '<div class="calc-results">'
    +'<div class="calc-result-card pos-card">'
      +'<div class="crc-label">\uD83D\uDCCA Tama\u00F1o de Posici\u00F3n</div>'
      +'<div class="crc-price">'+fmtUSD(pos)+'</div>'
      +'<div class="crc-pct">'+capital+' USD \u00D7 '+cLev+'x \u00B7 Liquidaci\u00F3n: $'+fmt(liqPrice)+' (\u2212'+(liqPct*100).toFixed(0)+'%)</div>'
    +'</div>'
    +'<div class="calc-row-group">'
      +'<div class="calc-result-card sl-card">'
        +'<div class="crc-label">\uD83D\uDED1 Stop Loss (\u2212'+slPctRaw+'%)</div>'
        +'<div class="crc-price">$'+fmt(slPrice)+'</div>'
        +'<div class="crc-pnl loss">\u2212'+fmtUSD(slLoss)+'<span class="crc-cap-pct loss-pct">'+slLossPct+'% capital</span></div>'
      +'</div>'
      +'<div class="calc-result-card tp1-card">'
        +'<div class="crc-label">\uD83C\uDFAF TP1 \u00B7 Ratio 1:2</div>'
        +'<div class="crc-price">$'+fmt(tp1Price)+'</div>'
        +'<div class="crc-pnl gain">+'+fmtUSD(tp1Gain)+'<span class="crc-cap-pct gain-pct">+'+(tp1Pct*cLev*100).toFixed(0)+'% capital</span></div>'
      +'</div>'
    +'</div>'
    +'<div class="calc-row-group">'
      +'<div class="calc-result-card tp2-card">'
        +'<div class="crc-label">\uD83C\uDFAF TP2 \u00B7 Ratio 1:3</div>'
        +'<div class="crc-price">$'+fmt(tp2Price)+'</div>'
        +'<div class="crc-pnl gain">+'+fmtUSD(tp2Gain)+'<span class="crc-cap-pct gain-pct">+'+(tp2Pct*cLev*100).toFixed(0)+'% capital</span></div>'
      +'</div>'
      +'<div class="calc-result-card tp3-card">'
        +'<div class="crc-label">\uD83C\uDFC6 TP3 \u00B7 Ratio 1:5</div>'
        +'<div class="crc-price">$'+fmt(tp3Price)+'</div>'
        +'<div class="crc-pnl gain">+'+fmtUSD(tp3Gain)+'<span class="crc-cap-pct gain-pct">+'+(tp3Pct*cLev*100).toFixed(0)+'% capital</span></div>'
      +'</div>'
    +'</div>'
    +'</div>';
  renderChart(capital,entry,cLev,slPrice,slLoss,liqPrice,slPct,tp1Price,tp1Gain,tp2Price,tp2Gain,tp3Price,tp3Gain);
}
</script>
